services:
  gladys:
    container_name: gladys
    image: docker.io/gladysassistant/gladys:v4.67.0
    privileged: true
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    environment:
      - NODE_ENV=production
      - SERVER_PORT=8270
      - TZ={{TZ}}
      - SQLITE_FILE_PATH=/var/lib/gladysassistant/gladys-production.db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - {{CONFIG}}/gladys/gladysassistant:/var/lib/gladysassistant
      - /dev:/dev
      - /run/udev:/run/udev:ro
