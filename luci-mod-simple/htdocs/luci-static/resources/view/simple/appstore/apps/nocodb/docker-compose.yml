services:
  nocodb:
    container_name: nocodb
    depends_on:
      nocodb-db:
        condition: service_healthy
    environment:
      - NC_DB=pg://nocodb-db:5432?u=postgres&p=${NOCODB_DB_PASSWORD}&d=nocodb
      - NC_PUBLIC_URL=http://localhost
      - NC_AUTH_JWT_SECRET=${NOCODB_JWT_SECRET}
      - NC_REDIS_URL=redis://default:${NOCODB_REDIS_PASSWORD}@nocodb-redis:6379
      - DB_QUERY_LIMIT_DEFAULT=${NOCODB_TABLE_ROWS-25}
    image: docker.io/nocodb/nocodb:0.301.2
    ports:
      - 8146:8080
    restart: always
    volumes:
      - {{CONFIG}}/nocodb/nocode-data:/usr/app/data
  nocodb-db:
    container_name: nocodb-db
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_PASSWORD: ${NOCODB_DB_PASSWORD}
      POSTGRES_USER: postgres
    healthcheck:
      interval: 10s
      retries: 10
      test: pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      timeout: 2s
    image: postgres:16
    restart: always
    volumes:
      - {{CONFIG}}/nocodb/postgres:/var/lib/postgresql/data
  nocodb-redis:
    image: redis:alpine
    container_name: nocodb-redis
    restart: unless-stopped
    command: redis-server --requirepass ${NOCODB_REDIS_PASSWORD}
    volumes:
      - {{CONFIG}}/nocodb/redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 1s
      timeout: 3s
      retries: 30
