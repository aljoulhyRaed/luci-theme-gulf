services:
  mempool:
    container_name: mempool
    image: docker.io/mempool/frontend:v3.2.1
    restart: unless-stopped
    stop_grace_period: 1m
    command: nginx -g 'daemon off;'
    ports:
      - 2200:8080
    depends_on:
      - mempool-db
    environment:
      FRONTEND_HTTP_PORT: '8080'
      BACKEND_MAINNET_HTTP_HOST: mempool-api
  mempool-api:
    container_name: mempool-api
    image: docker.io/mempool/backend:v3.2.1
    restart: unless-stopped
    stop_grace_period: 1m
    user: '0:0'
    volumes:
      - ${BITCOIND_DIR:-{{CONFIG}}/mempool/../bitcoind/data}:/data/.bitcoin:ro
      - {{CONFIG}}/mempool:/backend/cache
    command: ./start.sh
    depends_on:
      - mempool-db
    environment:
      MEMPOOL_BACKEND: electrum
      ELECTRUM_HOST: ${ELECTRUM_HOST:-electrs}
      ELECTRUM_PORT: ${ELECTRUM_PORT:-50001}
      ELECTRUM_TLS_ENABLED: 'false'
      CORE_RPC_HOST: ${CORE_RPC_HOST:-bitcoind}
      CORE_RPC_PORT: '8332'
      CORE_RPC_COOKIE: true
      CORE_RPC_COOKIE_PATH: /data/.bitcoin/.cookie
      CORE_RPC_TIMEOUT: '60000'
      DATABASE_ENABLED: 'true'
      DATABASE_HOST: mempool-db
      DATABASE_DATABASE: mempool
      DATABASE_USERNAME: mempool
      DATABASE_PASSWORD: ${MEMPOOL_DB_PASSWORD}
      STATISTICS_ENABLED: 'true'
  mempool-db:
    container_name: mempool-db
    image: mariadb:10.5.21
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      MYSQL_DATABASE: mempool
      MYSQL_USER: mempool
      MYSQL_PASSWORD: ${MEMPOOL_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MEMPOOL_DB_PASSWORD}
    volumes:
      - {{CONFIG}}/mempool/db:/var/lib/mysql
