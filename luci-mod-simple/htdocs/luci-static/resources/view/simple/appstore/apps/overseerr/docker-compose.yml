services:
  overseerr:
    container_name: overseerr
    image: ghcr.io/linuxserver/overseerr:1.35.0
    environment:
      - PUID=1000
      - PGID=1000
      - TZ={{TZ}}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{CONFIG}}/overseerr/config:/config
    ports:
      - 8116:5055
    restart: unless-stopped
