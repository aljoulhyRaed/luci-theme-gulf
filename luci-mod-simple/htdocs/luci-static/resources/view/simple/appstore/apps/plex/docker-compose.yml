services:
  plex:
    image: lscr.io/linuxserver/plex:1.43.0
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - ADVERTISE_IP=http://localhost/
    volumes:
      - {{CONFIG}}/plex/config:/config
      - {{CONFIG}}/plex/transcode:/transcode
      - {{MEDIA}}/data:/media
    restart: unless-stopped
