services:
  mealie-1:
    container_name: mealie-1
    image: ghcr.io/mealie-recipes/mealie:v3.11.0
    restart: unless-stopped
    ports:
      - 8220:9000
    deploy:
      resources:
        limits:
          memory: 1000M
    environment:
      ALLOW_SIGNUP: ${MEALIE_ALLOW_SIGNUP}
      PUID: 1000
      PGID: 1000
      TZ: {{TZ}}
      MAX_WORKERS: 1
      WEB_CONCURRENCY: 1
      BASE_URL: http://localhost
    volumes:
      - {{CONFIG}}/mealie-1:/app/data
