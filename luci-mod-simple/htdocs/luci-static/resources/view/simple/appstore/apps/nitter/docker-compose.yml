
services:
  nitter:
    image: docker.io/zedeus/nitter:latest
    container_name: nitter
    ports:
      - 8106:8080
    volumes:
      - "{{CONFIG}}/nitter/nitter.conf:/src/nitter.conf:ro"
    depends_on:
      - nitter-redis
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080",
        ]
      interval: 1m
      timeout: 3s  nitter-redis:
    image: redis:alpine
    container_name: nitter-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - "{{CONFIG}}/nitter/redis:/data"
    restart: unless-stopped
