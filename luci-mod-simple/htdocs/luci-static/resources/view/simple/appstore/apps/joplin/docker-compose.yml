services:
  joplin:
    container_name: joplin
    image: docker.io/joplin/server:3.5.2
    restart: unless-stopped
    depends_on:
      - db-joplin
    ports:
      - 8099:22300
    environment:
      - APP_PORT=22300
      - APP_BASE_URL=http://localhost/
      - DB_CLIENT=pg
      - POSTGRES_PASSWORD=${JOPLIN_DB_PASSWORD}
      - POSTGRES_USER=tipi
      - POSTGRES_DATABASE=joplin
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=db-joplin
      - MAX_TIME_DRIFT=0
  db-joplin:
    container_name: db-joplin
    image: postgres:14.2
    volumes:
      - {{CONFIG}}/joplin/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${JOPLIN_DB_PASSWORD}
      - POSTGRES_USER=tipi
      - POSTGRES_DB=joplin
