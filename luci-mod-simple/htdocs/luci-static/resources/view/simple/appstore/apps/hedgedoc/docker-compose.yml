services:
  hedgedoc:
    container_name: hedgedoc
    image: quay.io/hedgedoc/hedgedoc:1.10.7
    environment:
      - CMD_DB_URL=postgres://hedgedoc:${HEDGEDOC_DB_PASSWORD}@hedgedoc-db:5432/hedgedoc
      - CMD_DOMAIN=localhost
      - CMD_URL_ADDPORT=${HEDGEDOC_ADDPORT}
    volumes:
      - {{CONFIG}}/hedgedoc/hedgedoc-uploads:/hedgedoc/public/uploads
    ports:
      - 8142:3000
    restart: always
    depends_on:
      - hedgedoc-db
  hedgedoc-db:
    container_name: hedgedoc-db
    image: postgres:13.4-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hedgedoc
      - POSTGRES_PASSWORD=${HEDGEDOC_DB_PASSWORD}
      - POSTGRES_DB=hedgedoc
    volumes:
      - {{CONFIG}}/hedgedoc/postgres:/var/lib/postgresql/data
