services:
  scrypted:
    container_name: scrypted
    image: docker.io/koush/scrypted:20
    privileged: true
    volumes:
      - {{CONFIG}}/scrypted/scrypted/database:/server/volume
      - {{MEDIA}}/data/NVR/scrypted:/nvr
    environment:
      - SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION=${SCRYPTED_BEARER_TOKEN}
      - SCRYPTED_DOCKER_AVAHI=false
    devices:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/dri:/dev/dri
    restart: unless-stopped
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '10'
