services:
  haven:
    image: ghcr.io/havenweb/haven:latest
    container_name: haven
    restart: unless-stopped
    depends_on:
      - haven-db
    ports:
      - 8130:3000
    volumes:
      - {{CONFIG}}/haven/storage:/storage
    environment:
      - RAILS_ENV=production
      - HAVEN_DB_HOST=haven-db
      - HAVEN_DB_NAME=haven
      - HAVEN_DB_ROLE=haven
      - HAVEN_DB_PASSWORD=${HAVEN_DB_PASSWORD}
      - HAVEN_USER_EMAIL=${HAVEN_USER_EMAIL}
      - HAVEN_USER_PASS=${HAVEN_USER_PASSWORD}  haven-db:
    image: postgres:13.2-alpine
    container_name: haven-db
    restart: unless-stopped
    command:
      [
        "postgres",
        "-c",
        "max_connections=1000",
        "-c",
        "synchronous_commit=off",
        "-c",
        "fsync=off",
        "-c",
        "full_page_writes=off",
        "-c",
        "max_wal_size=4GB",
        "-c",
        "checkpoint_timeout=30min",
        "-c",
        "wal_level=logical",
      ]
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: haven
    volumes:
      - {{CONFIG}}/haven/db:/var/lib/postgresql/data
