services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:4.5.5
    container_name: sabnzbd
    ports:
      - 8168:8080
    volumes:
      - {{CONFIG}}/sabnzbd/config:/config
      - {{MEDIA}}/usenet:/media/usenet
    environment:
      - PUID=1000
      - PGID=1000
      - TZ={{TZ}}
    restart: unless-stopped
