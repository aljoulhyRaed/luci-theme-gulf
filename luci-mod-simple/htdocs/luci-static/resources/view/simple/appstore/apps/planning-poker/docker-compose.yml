services:
  planning-poker:
    image: docker.io/axeleroy/self-host-planning-poker:1.2.1
    container_name: planning-poker
    restart: unless-stopped
    ports:
      - 8880:8000
    volumes:
      - {{CONFIG}}/planning-poker:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:8000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s