services:
  invoice-ninja:
    image: docker.io/invoiceninja/invoiceninja:5.12
    container_name: invoice-ninja
    restart: unless-stopped
    user: '1500:1500'
    environment:
      - IN_USER_EMAIL=${INVOICE_NINJA_USER_MAIL}
      - IN_PASSWORD=${INVOICE_NINJA_USER_PASSWORD}
      - APP_URL=http://invoice-ninja-web
      - APP_NAME="Invoice Ninja"
      - APP_ENV=production
      - APP_KEY=${INVOICE_NINJA_APP_KEY}
      - APP_CIPHER=AES-256-CBC
      - DB_HOST=invoice-ninja-db
      - DB_PORT=3306
      - DB_DATABASE=ninja
      - DB_USERNAME=ninja
      - DB_PASSWORD=ninja
      - REQUIRE_HTTPS=false
      - QUEUE_CONNECTION=database
      - IS_DOCKER=TRUE
    volumes:
      - {{CONFIG}}/invoice-ninja/public:/var/www/app/public:rw,delegated
      - {{CONFIG}}/invoice-ninja/storage:/var/www/app/storage:rw,delegated
      - {{CONFIG}}/invoice-ninja/php/php.ini:/usr/local/etc/php/php.ini:ro
      - {{CONFIG}}/invoice-ninja/php/php-cli.ini:/usr/local/etc/php/php-cli.ini:ro
    depends_on:
      - invoice-ninja-db
  invoice-ninja-web:
    image: nginx:1.29
    container_name: invoice-ninja-web
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/invoice-ninja/nginx/invoice-ninja.conf:/etc/nginx/conf.d/default.conf:ro
      - {{CONFIG}}/invoice-ninja/public:/var/www/app/public:ro
    depends_on:
      invoice-ninja:
        condition: service_started
    ports:
      - 8881:80
  invoice-ninja-db:
    image: mariadb:10.7
    container_name: invoice-ninja-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${INVOICE_NINJA_BDD_PASSWORD}
      - MARIADB_USER=ninja
      - MARIADB_PASSWORD=ninja
      - MARIADB_DATABASE=ninja
    volumes:
      - {{CONFIG}}/invoice-ninja/mysql:/var/lib/mysql:rw,delegated
    depends_on:
      invoice-ninja-init:
        condition: service_completed_successfully
    command:
      - mysqld
      - '--character-set-server=utf8mb4'
      - '--collation-server=utf8mb4_unicode_ci'
      - '--wait_timeout=28800'
      - '--log-warnings=0'
  invoice-ninja-init:
    image: bash:5.2.37
    container_name: invoice-ninja-init
    volumes:
      - {{CONFIG}}/invoice-ninja:/tmp/data
    command: bash -c "chmod +x /tmp/data/init/init.sh && /tmp/data/init/init.sh "
