services:
  shlink:
    container_name: shlink
    image: ghcr.io/shlinkio/shlink:5.0.0
    environment:
      - DEFAULT_DOMAIN=localhost
      - IS_HTTPS_ENABLED=true
      - DB_DRIVER=postgres
      - DB_HOST=shlink-db
      - DB_NAME=shlink
      - DB_USER=shlink
      - DB_PASSWORD=${SHLINK_POSTGRES_PASSWORD}
    ports:
      - 8207:8080
    restart: unless-stopped
    depends_on:
      - shlink-db
    volumes: []
  shlink-db:
    container_name: shlink-db
    image: postgres:17.2-alpine
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/shlink/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${SHLINK_POSTGRES_PASSWORD}
      - POSTGRES_USER=shlink
      - POSTGRES_DB=shlink
