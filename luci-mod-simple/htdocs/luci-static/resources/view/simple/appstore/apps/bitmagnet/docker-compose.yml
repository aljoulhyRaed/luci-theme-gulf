
services:
  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:v0.10.0
    restart: unless-stopped
    command:
      - worker
      - run
      - --keys=http_server
      - --keys=queue_server
      # disable the next line to run without DHT crawler
      - --keys=dht_crawler
    container_name: bitmagnet
    environment:
      - POSTGRES_HOST=bitmagnet-db
      - POSTGRES_NAME=bitmagnet
      - POSTGRES_USER=tipi
      - POSTGRES_PASSWORD=${BITMAGNENT_DB_PASSWORD}
      - REDIS_ADDR=bitmagnet-redis:6379
    ports:
      - "3335:3333"
      - "3334:3334/tcp"
      - "3334:3334/udp"
    depends_on:
      bitmagnet-db:
        condition: service_healthy
      bitmagnet-redis:
        condition: service_started  bitmagnet-db:
    container_name: bitmagnet-db
    image: postgres:17-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - {{CONFIG}}/bitmagnet/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${BITMAGNENT_DB_PASSWORD}
      POSTGRES_USER: tipi
      POSTGRES_DB: bitmagnet
  bitmagnet-redis:
    image: redis:alpine
    command: --save 60 1 --loglevel warning
    container_name: bitmagnet-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - {{CONFIG}}/bitmagnet/redis:/data
