services:
  stirling-pdf:
    image: docker.io/stirlingtools/stirling-pdf:2.5.3
    restart: unless-stopped
    container_name: stirling-pdf
    privileged: true
    ports:
      - 8234:8080
    volumes:
      - {{CONFIG}}/stirling-pdf/trainingData:/usr/share/tesseract-ocr/5/tessdata
      - {{CONFIG}}/stirling-pdf/extraConfigs:/configs
      - {{CONFIG}}/stirling-pdf/customFiles:/customFiles/
      - {{CONFIG}}/stirling-pdf/logs:/logs/
    environment:
      - DOCKER_ENABLE_SECURITY=${STIRLING_PDF_DOCKER_ENABLE_SECURITY-false}
