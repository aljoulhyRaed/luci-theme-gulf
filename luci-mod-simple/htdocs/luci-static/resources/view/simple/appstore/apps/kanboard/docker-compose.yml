services:
  kanboard:
    container_name: kanboard
    image: docker.io/kanboard/kanboard:v1.2.50
    environment:
      - PLUGIN_INSTALLER=${PLUGIN_INSTALLER}
    ports:
      - 8010:80
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/kanboard/kanboard_data:/var/www/app/data
      - {{CONFIG}}/kanboard/kanboard_plugins:/var/www/app/plugins
