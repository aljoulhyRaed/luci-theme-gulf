services:
  planka:
    image: ghcr.io/plankanban/planka:1.26.3
    container_name: planka
    command: |
      bash -c
        "for i in `seq 1 30`; do
          ./start.sh &&
          s=$$? && break || s=$$?;
          echo \"Tried $$i times. Waiting 5 seconds...\";
          sleep 5;
        done; (exit $$s)"
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/planka/user-avatars:/app/public/user-avatars
      - {{CONFIG}}/planka/project-background-images:/app/public/project-background-images
      - {{CONFIG}}/planka/attachments:/app/private/attachments
    ports:
      - 8016:1337
    environment:
      - BASE_URL=http://localhost
      - TRUST_PROXY=1
      - DATABASE_URL="postgresql://postgres@postgres/planka"
      - SECRET_KEY="${PLANKA_SECRET_KEY}"
    depends_on:
      - postgres
  postgres:
    image: postgres:14-alpine
    container_name: planka-db
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/planka/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: planka
      POSTGRES_HOST_AUTH_METHOD: trust
