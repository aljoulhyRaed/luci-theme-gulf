services:
  recyclarr:
    user: ${TIPI_UID}:${TIPI_GID}
    container_name: recyclarr
    image: ghcr.io/recyclarr/recyclarr:8.2.1
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/recyclarr/config:/config
    environment:
      - RECYCLARR_CREATE_CONFIG=${RECYCLARR_CREATE_CONFIG-true}
      - TZ={{TZ}}
