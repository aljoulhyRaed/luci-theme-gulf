services:
  hoarder:
    image: ghcr.io/hoarder-app/hoarder:0.30.0
    container_name: hoarder
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/hoarder/app:/data
    ports:
      - 8685:3000
    environment:
      - MEILI_ADDR=http://hoarder-meilisearch:7700
      - BROWSER_WEB_URL=http://hoarder-chrome:9222
      - DATA_DIR=/data
      - HOARDER_VERSION=0.16.0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - NEXTAUTH_URL=http://localhost
  hoarder-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: hoarder-chrome
    restart: unless-stopped
    command:
      - '--no-sandbox'
      - '--disable-gpu'
      - '--disable-dev-shm-usage'
      - '--remote-debugging-address=0.0.0.0'
      - '--remote-debugging-port=9222'
      - '--hide-scrollbars'
  hoarder-meilisearch:
    image: docker.io/getmeili/meilisearch:v1.35
    container_name: hoarder-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - {{CONFIG}}/hoarder/melli_data:/meili_data
