services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.10.1
    container_name: homepage
    restart: unless-stopped
    ports:
      - 8756:3000
    volumes:
      - {{CONFIG}}/homepage/:/app/config
    environment:
      - HOMEPAGE_ALLOWED_HOSTS: ${APP_LOCAL_DOMAIN},localhost,${APP_HOST}:8756
