services:
  cloudflared:
    image: docker.io/wisdomsky/cloudflared-web:2026.2.0
    container_name: cloudflared
    restart: unless-stopped
    network_mode: host
    volumes:
      - {{CONFIG}}/cloudflared/cloudflared/config:/config
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS}
