
services:
  hammond:
    container_name: hammond
    image: docker.io/alfhou/hammond:v0.0.24
    ports:
      - 8185:3000
    volumes:
      - {{CONFIG}}/hammond/config:/config
      - {{CONFIG}}/hammond/assets:/assets
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ={{TZ}}
    restart: unless-stopped    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
