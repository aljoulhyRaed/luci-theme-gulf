services:
  halo:
    image: docker.io/halohub/halo:2.22.14
    container_name: halo
    restart: unless-stopped
    depends_on:
      halodb:
        condition: service_healthy
    volumes:
      - {{CONFIG}}/halo:/root/.halo2
    ports:
      - 8092:8090
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:8090/actuator/health/readiness
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - '--spring.r2dbc.url=r2dbc:pool:postgresql://halodb/halo'
      - '--spring.r2dbc.username=halo'
      - '--spring.r2dbc.password=${HALO_DATABASE_PASSWORD}'
      - '--spring.sql.init.platform=postgresql'
      - '--halo.external-url=${HALO_EXTERNAL_URL}'
  halodb:
    image: postgres:latest
    container_name: halodb
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/halo/db:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD
        - pg_isready
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_PASSWORD=${HALO_DATABASE_PASSWORD}
      - POSTGRES_USER=halo
      - POSTGRES_DB=halo
      - PGUSER=halo
