services:
  kasm-workspaces:
    image: lscr.io/linuxserver/kasm:1.120.20221218
    container_name: kasm-workspaces
    privileged: true
    environment:
      - KASM_PORT=8744
    volumes:
      - {{CONFIG}}/kasm-workspaces:/opt
    ports:
      - 8743:3000
      - 8744:8744
    restart: unless-stopped