services:
  syncthing:
    container_name: syncthing
    image: docker.io/syncthing/syncthing:2.0.14
    stop_grace_period: 1m
    hostname: ${SYNCTHING_HOSTNAME:-tipi}
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - {{CONFIG}}/syncthing:/var/syncthing
      - {{MEDIA}}/data/syncthing:/media/data/syncthing
    ports:
      - 8090:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
