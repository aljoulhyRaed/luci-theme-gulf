services:
  tinyauth:
    container_name: tinyauth
    image: ghcr.io/steveiliop56/tinyauth:v4.1.0
    restart: unless-stopped
    environment:
      - APP_TITLE=${TINYAUTH_APP_TITLE}
      - APP_URL=${TINYAUTH_APP_URL}
      - USERS=${TINYAUTH_USERS}
      - PROVIDERS_GITHUB_CLIENT_ID=${TINYAUTH_GITHUB_CLIENT_ID}
      - PROVIDERS_GITHUB_CLIENT_SECRET=${TINYAUTH_GITHUB_CLIENT_SECRET}
      - PROVIDERS_GOOGLE_CLIENT_ID=${TINYAUTH_GOOGLE_CLIENT_ID}
      - PROVIDERS_GOOGLE_CLIENT_SECRET=${TINYAUTH_GOOGLE_CLIENT_SECRET}
      - OAUTH_WHITELIST=${TINYAUTH_OAUTH_WHITELIST}
    volumes:
      - {{CONFIG}}/tinyauth:/data
