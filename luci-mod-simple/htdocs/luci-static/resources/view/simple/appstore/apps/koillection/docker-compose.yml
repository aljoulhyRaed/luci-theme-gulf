services:
  koillection:
    image: docker.io/koillection/koillection:1.8.0
    container_name: koillection
    restart: unless-stopped
    ports:
      - 8050:80
    depends_on:
      - koillection-db
    volumes:
      - {{CONFIG}}/koillection/uploads:/uploads
    environment:
      - APP_DEBUG=0
      - APP_ENV=prod
      - HTTPS_ENABLED={APP_EXPOSED}
      - UPLOAD_MAX_FILESIZE=20M
      - PHP_MEMORY_LIMIT=512M
      - PHP_TZ={{TZ}}
      - CORS_ALLOW_ORIGIN=*
      - JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
      - JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
      - DB_DRIVER=pdo_pgsql
      - DB_NAME=koillection
      - DB_HOST=koillection-db
      - DB_PORT=5432
      - DB_USER={KOILLECTION_DB_USER}
      - DB_PASSWORD={KOILLECTION_DB_PASSWORD}
      - DB_VERSION=15
  koillection-db:
    image: postgres:15
    container_name: koillection-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=koillection
      - POSTGRES_USER={KOILLECTION_DB_USER}
      - POSTGRES_PASSWORD={KOILLECTION_DB_PASSWORD}
    volumes:
      - {{CONFIG}}/koillection/volumes/postgresql:/var/lib/postgresql/data
