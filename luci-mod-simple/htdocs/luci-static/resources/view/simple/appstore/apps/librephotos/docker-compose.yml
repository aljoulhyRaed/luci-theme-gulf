services:
  librephotos:
    image: docker.io/reallibrephotos/librephotos-proxy:2023w48
    container_name: librephotos
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/librephotos/scan:/data
      - {{CONFIG}}/librephotos/protected_media:/protected_media
      - {{CONFIG}}/librephotos/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8132:80
    depends_on:
      - librephotos-backend
      - librephotos-frontend  librephotos-db:
    image: postgres:14
    container_name: librephotos-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${LIBREPHOTOS_DB_PASSWORD}
      POSTGRES_USER: tipi
      POSTGRES_DB: librephotos
    volumes:
      - {{CONFIG}}/librephotos/db:/var/lib/postgresql/data
    #Checking health of Postgres db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  librephotos-frontend:
    image: docker.io/reallibrephotos/librephotos-frontend:2023w48
    container_name: librephotos-frontend
    restart: unless-stopped
    depends_on:
      - librephotos-backend
  librephotos-backend:
    image: docker.io/reallibrephotos/librephotos:2023w48
    container_name: librephotos-backend
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/librephotos/scan:/data
      - {{CONFIG}}/librephotos/protected_media:/protected_media
      - {{CONFIG}}/librephotos/logs:/logs
      - {{CONFIG}}/librephotos/cache:/root/.cache
    environment:
      - SECRET_KEY=${LIBREPHOTOS_SECRET_KEY}
      - BACKEND_HOST=librephotos-backend
      - ADMIN_EMAIL=${LIBREPHOTOS_EMAIL}
      - ADMIN_USERNAME=${LIBREPHOTOS_USERNAME}
      - ADMIN_PASSWORD=${LIBREPHOTOS_PASSWORD}
      - DB_BACKEND=postgresql
      - DB_NAME=librephotos
      - DB_USER=tipi
      - DB_PASS=${LIBREPHOTOS_DB_PASSWORD}
      - DB_HOST=librephotos-db
      - DB_PORT=5432
      - REDIS_HOST=librephotos-redis
      - REDIS_PORT=6379
      - ALLOW_UPLOAD=true
      - DEBUG=0
      - CSRF_TRUSTED_ORIGINS=http://localhost,http://${INTERNAL_IP}:8132
    # Wait for Postgres
    depends_on:
      librephotos-db:
        condition: service_healthy
  librephotos-redis:
    image: redis:6
    container_name: librephotos-redis
    restart: unless-stopped
