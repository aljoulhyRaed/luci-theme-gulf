services:
  glances:
    container_name: glances
    restart: unless-stopped
    ports:
      - 8420:61208
    environment:
      - TZ={{TZ}}
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    pid: host
    image: docker.io/nicolargo/glances:4.5.0.5