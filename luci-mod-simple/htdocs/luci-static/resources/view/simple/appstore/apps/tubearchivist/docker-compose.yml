services:
  tubearchivist:
    container_name: tubearchivist
    restart: unless-stopped
    image: docker.io/bbilly1/tubearchivist:v0.5.9
    ports:
      - 8120:8000
    volumes:
      - {{MEDIA}}/data/youtube:/youtube
      - {{CONFIG}}/tubearchivist/cache:/cache
    environment:
      - ES_URL=http://tubearchivist-es:9200
      - REDIS_HOST=tubearchivist-redis
      - HOST_UID=1000
      - HOST_GID=1000
      - TA_USERNAME=${TA_USER}
      - TA_PASSWORD=${TA_PASSWORD}
      - TA_HOST=localhost
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      - tubearchivist-es
      - tubearchivist-redis
  tubearchivist-redis:
    image: docker.io/redislabs/rejson:latest
    container_name: tubearchivist-redis
    restart: always
    volumes:
      - {{CONFIG}}/tubearchivist/redis-data:/data
    depends_on:
      - tubearchivist-es
  tubearchivist-es:
    image: elasticsearch:8.18.0
    container_name: tubearchivist-es
    restart: always
    environment:
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - path.repo=/usr/share/elasticsearch/data/snapshot
    volumes:
      - {{CONFIG}}/tubearchivist/es:/usr/share/elasticsearch/data
    expose:
      - '9200'
