services:
  onedev:
    image: docker.io/1dev/server:14.1.6
    container_name: onedev
    environment:
      - hibernate_dialect=io.onedev.server.persistence.PostgreSQLDialect
      - hibernate_connection_driver_class=org.postgresql.Driver
      - hibernate_connection_url=jdbc:postgresql://onedev-db:5432/onedev
      - hibernate_connection_username=tipi
      - hibernate_connection_password=${ONEDEV_DB_PASSWORD}
      - initial_user=${ONEDEV_USERNAME}
      - initial_password=${ONEDEV_PASSWORD}
      - initial_email=${ONEDEV_EMAIL}
      - initial_server_url=localhost
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/onedev/onedev:/opt/onedev
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 6610:6610
      - '6611:6611'
    depends_on:
      - onedev-db
  onedev-db:
    container_name: onedev-db
    image: postgres:14
    restart: unless-stopped
    environment:
      - POSTGRES_USER=tipi
      - POSTGRES_PASSWORD=${ONEDEV_DB_PASSWORD}
      - POSTGRES_DB=onedev
    volumes:
      - {{CONFIG}}/onedev/postgres:/var/lib/postgresql/data
