
services:
  minecraft-server:
    container_name: minecraft-server
    image: docker.io/itzg/minecraft-server:latest
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"
      VERSION: ${MC_VERSION:-LATEST}
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/minecraft-server/minecraft-data:/data