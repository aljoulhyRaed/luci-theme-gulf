services:
  logto:
    depends_on:
      logto-db:
        condition: service_healthy
    image: docker.io/svhd/logto:1.36.0
    container_name: logto
    entrypoint:
      - sh
      - '-c'
      - npm run cli db seed -- --swe && npm start
    ports:
      - 8203:3001
      - '8204:3002'
    environment:
      - NODE_ENV=production
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://tipi:${LOGTO_DB_PASSWORD}@logto-db:5432/logto
      - ENDPOINT=https://localhost
      - ADMIN_ENDPOINT=https://${LOGTO_ADMIN_URL}
  logto-db:
    container_name: logto-db
    image: postgres:14
    restart: unless-stopped
    environment:
      - POSTGRES_USER=tipi
      - POSTGRES_PASSWORD=${LOGTO_DB_PASSWORD}
      - POSTGRES_DB=logto
    volumes:
      - {{CONFIG}}/logto/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      interval: 10s
      timeout: 5s
      retries: 5
