services:
  email-oauth2-proxy:
    container_name: email-oauth2-proxy
    image: ghcr.io/blacktirion/email-oauth2-proxy-docker:2026.01.06
    ports:
      - 1999:80
    restart: unless-stopped
    volumes:
      - {{CONFIG}}/email-oauth2-proxy/config:/config:rw
    environment:
      - DEBUG=true
      - CACHE_STORE=/config/credstore.config
      - LOGFILE=true
      - LOCAL_SERVER_AUTH=true
