services:
  ollama-nvidia:
    image: docker.io/ollama/ollama:0.16.3
    restart: unless-stopped
    container_name: ollama-nvidia
    ports:
      - 11435:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    volumes:
      - {{CONFIG}}/ollama-nvidia/.ollama:/root/.ollama
