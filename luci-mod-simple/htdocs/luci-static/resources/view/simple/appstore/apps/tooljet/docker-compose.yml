
services:
  tooljet:
    container_name: tooljet
    tty: true
    stdin_open: true
    image: docker.io/tooljet/tooljet-client-ce:v2.4.2
    restart: always
    ports:
      - 9876:80
    depends_on:
      - tooljet-server
    environment:
      - SERVER_HOST=tooljet-server    command: openresty -g "daemon off;"

  tooljet-server:
    container_name: tooljet-server
    image: docker.io/tooljet/tooljet-server-ce:v2.24.0
    tty: true
    stdin_open: true
    restart: always
    environment:
      - SERVE_CLIENT=false
      - SERVER_HOST=tooljet-server
      - TOOLJET_HOST=https://localhost
      - LOCKBOX_MASTER_KEY=${LOCKBOX_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PG_DB=tooljet
      - PG_USER=tooljet
      - PG_HOST=db-tooljet
      - PG_PASS=${DB_PASSWORD}
      - CHECK_FOR_UPDATES=check_if_updates_are_available
      - DEFAULT_FROM_EMAIL=hello@tooljet.io
    command: npm run start:prod
  db-tooljet:
    container_name: db-tooljet
    image: postgres:11
    restart: on-failure
    volumes:
      - {{CONFIG}}/tooljet/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=tooljet
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=tooljet
      - PGDATA=/data/postgres
